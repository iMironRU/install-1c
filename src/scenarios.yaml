# Каталог сценариев установки 1С.
#
# Каждый сценарий именован (snake-case или kebab-case), имеет описание
# на трёх языках (см. konspekt.md, инвариант 5), целевое состояние
# и критерий проверки.
#
# Первый круг — пять базовых сценариев. Расширение — через PR
# с обновлением matrix.yaml и появлением хотя бы одного path.

scenarios:

  dev-learn:
    title:
      user: "Хочу научиться разрабатывать в 1С"
      business: "АРМ обучающегося разработчика"
      machine: "Платформа 8.5 (клиент + конфигуратор) + файловая ИБ + демонстрационная конфигурация"
    target_state: >
      На машине запускается Конфигуратор, открывается демонстрационная ИБ,
      доступно редактирование объектов метаданных.
    verification: >
      Запуск конфигуратора с указанием демо-ИБ возвращает 0,
      в логе нет ошибок инициализации, окно конфигурации открыто.

  thin-client-user:
    title:
      user: "Поставили новый компьютер, нужно подключить к 1С"
      business: "Рабочее место пользователя — тонкий клиент к опубликованной или серверной ИБ"
      machine: "Тонкий клиент платформы 8.5 + список ИБ + учётная запись пользователя"
    target_state: >
      Пользователь запускает тонкий клиент, видит свою ИБ в списке,
      входит под своим логином, открывает рабочую форму.
    verification: >
      Тонкий клиент стартует без ошибок, конкретная ИБ открывается,
      имя пользователя присутствует в шапке окна.

  office-file:
    title:
      user: "Поставить 1С на 3–5 человек в маленьком офисе"
      business: "Файловая ИБ на сетевой шаре + клиенты на рабочих станциях"
      machine: "Платформа 8.5 (клиент) + ИБ на SMB-шаре с правами + список ИБ на станциях"
    target_state: >
      Несколько пользователей одновременно работают с одной файловой ИБ
      без блокировок на бытовых операциях.
    verification: >
      Параллельный запуск с двух и более станций, запись справочника
      видна на всех, технологический журнал не фиксирует блокировок
      на тестовом сценарии.

  office-server:
    title:
      user: "У нас выросло, нужна серверная 1С"
      business: "Серверная установка с СУБД и публикацией"
      machine: "Сервер 1С:Предприятие 8.5 + PostgreSQL (или MS SQL) + опубликованная ИБ + клиентские лицензии"
    target_state: >
      Кластер 1С работает, ИБ создана на сервере, клиенты подключаются
      по hostname, публикация на веб-сервере доступна.
    verification: >
      `rac cluster list` возвращает живой кластер,
      клиент подключается к ИБ,
      журнал регистрации пишется,
      веб-публикация отвечает 200 на корневом URL.

  cloud-fresh:
    title:
      user: "Хочу работать в 1С через интернет, без своего сервера"
      business: "Подключение к 1С:Фреш / облачному сервису"
      machine: "Тонкий клиент 8.5 + учётная запись сервиса + список ИБ, полученный с сервиса"
    target_state: >
      Пользователь входит в облачный сервис из тонкого клиента
      и работает с базой.
    verification: >
      Список баз получен с сервиса, выбранная ИБ открывается,
      операции синхронизируются с облаком.
